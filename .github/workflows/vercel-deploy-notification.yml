name: Vercel Deploy Notification

on:
  deployment_status:
    states: [success, failure]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get commit message from GitHub API
        id: commit
        run: |
          MSG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" \
            | jq -r '.commit.message | split("\n")[0]')
          echo "message=$MSG" >> $GITHUB_OUTPUT
      
      - name: Send notification to webhook
        run: |
          curl -X POST "${{ secrets.WEBHOOK_URL }}/api/webhook/github" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "created",
              "deployment_status": {
                "state": "${{ github.event.deployment_status.state }}",
                "environment_url": "${{ github.event.deployment_status.environment_url }}",
                "log_url": "${{ github.event.deployment_status.log_url }}",
                "description": "${{ github.event.deployment_status.description }}",
                "environment": "${{ github.event.deployment_status.environment }}"
              },
              "deployment": {
                "id": "${{ github.event.deployment_status.deployment_id }}",
                "sha": "${{ github.sha }}",
                "ref": "${{ github.event.repository.default_branch }}",
                "environment": "${{ github.event.deployment_status.environment }}",
                "message": "${{ steps.commit.outputs.message }}"
              },
              "repository": {
                "name": "${{ github.event.repository.name }}",
                "full_name": "${{ github.event.repository.full_name }}",
                "html_url": "${{ github.event.repository.html_url }}"
              }
            }'
